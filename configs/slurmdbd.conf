# /etc/slurm/slurmdbd.conf — controller (vm1) only
# IMPORTANT: Mode 600, owned by slurm:slurm
#
# SECURITY: Before deploying, replace REPLACE_WITH_STRONG_PASSWORD with a
# real strong password. NEVER commit a real password to version control.
# Consider sourcing it from a secrets manager or environment variable instead.

AuthType=auth/munge
DbdHost=cloud-native-stack-vm1
DbdPort=6819
SlurmUser=slurm
StorageType=accounting_storage/mysql
StorageHost=localhost
StorageUser=slurm
StoragePass=REPLACE_WITH_STRONG_PASSWORD
StorageLoc=slurm_acct_db
LogFile=/var/log/slurm/slurmdbd.log
PidFile=/run/slurmdbd/slurmdbd.pid
